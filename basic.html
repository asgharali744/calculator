<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online scientific calculator. Perform basic and advanced math operations quickly. Fast and accurate online tool.">
    <meta name="keywords" content="scientific calculator, online calculator, math calculator, standard calculator, free calculator">
    <title>Scientific Calculator - Free Online Math Tool | CalcPlus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .calculator-ui {
            background: #0f172a;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .calc-display {
            background: #1e293b;
            color: #f8fafc;
            font-size: 2.5rem;
            text-align: right;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            min-height: 80px;
            word-break: break-all;
            border: 1px solid #334155;
            font-family: monospace;
        }

        .calc-keys {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        .calc-btn {
            background: #334155;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.25rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.1s;
        }

        .calc-btn:hover {
            background: #475569;
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        .calc-btn.operator {
            background: #2563eb;
        }

        .calc-btn.operator:hover {
            background: #1d4ed8;
        }

        .calc-btn.clear {
            background: #ef4444;
            grid-column: span 2;
        }
        
        .calc-btn.clear:hover {
            background: #dc2626;
        }

        .calc-btn.equal {
            background: #10b981;
            grid-column: span 2;
        }

        .calc-btn.equal:hover {
            background: #059669;
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="../index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="14.01"></line><line x1="12" y1="14" x2="12" y2="14.01"></line><line x1="8" y1="14" x2="8" y2="14.01"></line><line x1="16" y1="10" x2="16" y2="10.01"></line><line x1="12" y1="10" x2="12" y2="10.01"></line><line x1="8" y1="10" x2="8" y2="10.01"></line><line x1="16" y1="18" x2="16" y2="18.01"></line><line x1="12" y1="18" x2="12" y2="18.01"></line><line x1="8" y1="18" x2="8" y2="18.01"></line></svg>
                Calc<span>Plus</span>
            </a>
        </div>
    </header>

    <main class="container calc-page">
        <div class="breadcrumb">
            <a href="../index.html">Home</a> / Math Calculators / Scientific Calculator
        </div>

        <div class="calc-container">
            <h1>Scientific Calculator</h1>
            
            <div class="calculator-ui">
                <div class="calc-display" id="display">0</div>
                <div class="calc-keys">
                    <button class="calc-btn clear" onclick="clearDisplay()">C</button>
                    <button class="calc-btn operator" onclick="appendOperator('(')">(</button>
                    <button class="calc-btn operator" onclick="appendOperator(')')">)</button>

                    <button class="calc-btn" onclick="appendNumber('7')">7</button>
                    <button class="calc-btn" onclick="appendNumber('8')">8</button>
                    <button class="calc-btn" onclick="appendNumber('9')">9</button>
                    <button class="calc-btn operator" onclick="appendOperator('/')">÷</button>

                    <button class="calc-btn" onclick="appendNumber('4')">4</button>
                    <button class="calc-btn" onclick="appendNumber('5')">5</button>
                    <button class="calc-btn" onclick="appendNumber('6')">6</button>
                    <button class="calc-btn operator" onclick="appendOperator('*')">×</button>

                    <button class="calc-btn" onclick="appendNumber('1')">1</button>
                    <button class="calc-btn" onclick="appendNumber('2')">2</button>
                    <button class="calc-btn" onclick="appendNumber('3')">3</button>
                    <button class="calc-btn operator" onclick="appendOperator('-')">-</button>

                    <button class="calc-btn" onclick="appendNumber('0')">0</button>
                    <button class="calc-btn" onclick="appendNumber('.')">.</button>
                    <button class="calc-btn equal" onclick="calculate()">=</button>
                    <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CalcPlus. All rights reserved.</p>
    </footer>

    <script src="basic.js"></script>
</body>
</html>
